# GoReleaser config for the Fallbakit developer CLI.
# https://goreleaser.com — run `goreleaser release --clean` from a tagged commit.
version: 2

project_name: fallbakit

before:
  hooks:
    - go mod tidy

builds:
  - id: fallbakit
    main: ./cmd/fallbakit-cli
    binary: fallbakit
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/fallbakit/cli/internal/cli.Version={{ .Version }}
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]

archives:
  - id: fallbakit
    name_template: "fallbakit_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

homebrew_casks:
  - name: fallbakit
    repository:
      owner: fallbakit
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://fallbakit.com"
    description: "Local-first AI inference with cloud fallback — developer CLI"
    license: "Apache-2.0"
    # The binary is unsigned; strip the gatekeeper quarantine on install so
    # macOS doesn't block first run ("developer cannot be verified").
    hooks:
      post:
        install: |
          if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/fallbakit"]
          end

release:
  github:
    owner: fallbakit
    name: cli
